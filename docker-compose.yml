services:
  account-service:
    build:
      context: ./services/account_service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      ACCOUNT_DATABASE_URL: sqlite:////data/account.db
    volumes:
      - account-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  event-gateway:
    build:
      context: ./services/event_gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ACCOUNT_SERVICE_URL: http://account-service:8001
      GATEWAY_DATABASE_URL: sqlite:////data/gateway.db
    volumes:
      - gateway-data:/data
    depends_on:
      account-service:
        condition: service_healthy

volumes:
  account-data:
  gateway-data:
